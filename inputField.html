<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input field Handling</title>
    <style>
        #name,#email, #password {
            background-color:cyan;
            color:black bold;
            border: solid 2px black;
        }
        #submit{
            background-color: yellow;
            border: solid 2px black;
            color:black;
        }

    </style>
</head>
<body>
    <h1 style="background: yellow">Form Handling</h1>
    <input type="text" placeholder="Enter your name" id="name">
    <br><br>
    <input type="text" placeholder="Enter Email here" id="email">
    <br><br>
    <input type="text" placeholder="Enter password" id="password">
    <br><br>
    <button id="submit">Submit</button>

    <script>
        let name=document.querySelector("#name");
        let email=document.querySelector("#email");
        let password=document.querySelector("#password");

        let submit=document.querySelector("#submit");
        submit.disabled=true;

        submit.addEventListener("click",function(){
            console.log(name.value, email.value, password.value);
        })

        name.addEventListener("input",handleInput);
        email.addEventListener("input",handleInput);
        password.addEventListener("input",handleInput);
        
        function handleInput(){
            // .value gives the text entered by user
            if(name.value && email.value && password.value){
                submit.disabled=false;
            }
            else{
                submit.disabled=true;
            }
        }


    </script>
    
</body>
</html>
