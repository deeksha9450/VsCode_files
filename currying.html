<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Hi, This is currying function</h3>
    <script>
        //this is normal function
        // function add(a,b,c){    
        //     return a+b+c;
        // }
        // console.log(add(1,2,3));

        // this is currying function
        function add(a){
            return function(b){
                return function(c){
                    return a+b+c;
                };
            }
        }
        console.log(add(1)(2)(3)); 
// below is example of currying with partial application
        function minus(a){
            return function(b){
                    return a-b;
                };
            }
        const partial=minus(6);
        console.log(partial(2));
        console.log(partial(3));
    </script>
</body>
</html>
